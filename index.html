<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: transparent; }

        #mark-container {
            width: 512px; height: 512px;
            display: flex; align-items: flex-end; justify-content: center; 
        }

        #mark {
            width: 512px; height: 512px;
            background-size: contain; background-repeat: no-repeat;
            background-position: bottom center; cursor: pointer;
            background-image: url('./assets/MarkOjosAbiertos.png');
            transform: translateY(0); transition: transform 0.2s ease-out;
        }

        /* ANIMACIÓN 1: Mirando al frente */
        @keyframes parpadeoMark {
            0%, 90%, 100% { background-image: url('./assets/MarkOjosAbiertos.png'); }
            92% { background-image: url('./assets/MarkOjosPaAbiertos.png'); }
            94% { background-image: url('./assets/MarkOjosPaCerrados.png'); }
            96% { background-image: url('./assets/MarkOjosCerrados.png'); }
            98% { background-image: url('./assets/MarkOjosPaCerrados.png'); }
        }

        /* ANIMACIÓN 2: Mirando a YouTube (Izquierda) */
        @keyframes parpadeoMarkYT {
            0%, 90%, 100% { background-image: url('./assets/MarkOjosAbiertosYT.png'); }
            92% { background-image: url('./assets/MarkOjosPaAbiertosYT.png'); }
            94% { background-image: url('./assets/MarkOjosPaCerradosYT.png'); }
            96% { background-image: url('./assets/MarkOjosCerradosYT.png'); }
            98% { background-image: url('./assets/MarkOjosPaCerradosYT.png'); }
        }

        /* Clases de estado */
        .idle-parpadeo { 
            animation-name: parpadeoMark; 
            animation-iteration-count: infinite;
        }

        .modo-youtube { 
            animation-name: parpadeoMarkYT !important; 
            animation-iteration-count: infinite !important;
        }

        #mark.reaccion-activo { transform: translateY(0); animation: none !important; }
    </style>
</head>
<body>
    <div id="mark-container">
        <div id="mark" class="idle-parpadeo" onclick="clickMark()"></div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        const markElement = document.getElementById('mark');
        let reaccionTimer = null;
        let viendoYoutube = false;

        // Receptor de modo YouTube
        ipcRenderer.on('youtube-mode', (event, isYoutube) => {
            viendoYoutube = isYoutube;
            
            if (isYoutube) {
                markElement.classList.remove('idle-parpadeo');
                markElement.classList.add('modo-youtube');
            } else {
                markElement.classList.remove('modo-youtube');
                markElement.classList.add('idle-parpadeo');
            }
            aplicarRitmoAleatorio();
        });

        function aplicarRitmoAleatorio() {
            // Solo aplicamos ritmo si no está en medio de un clic
            if (!markElement.classList.contains('reaccion-activo')) {
                const tiempoRandom = Math.floor(Math.random() * (8 - 4 + 1)) + 4; 
                markElement.style.animationDuration = `${tiempoRandom}s`;
            }
        }

        // Intervalo único para el ritmo aleatorio (cada 5 segundos)
        setInterval(aplicarRitmoAleatorio, 5000);

        function clickMark() {
            clearTimeout(reaccionTimer);
            
            // Quitamos estados de parpadeo para la reacción
            markElement.classList.remove('idle-parpadeo');
            markElement.classList.remove('modo-youtube');
            markElement.classList.add('reaccion-activo');

            const suerte = Math.random();
            if (suerte < 0.10) {
                markElement.style.backgroundImage = "url('./assets/MarkSonriendoConMano.png')";
            } else {
                markElement.style.backgroundImage = "url('./assets/MarkSonriendo.png')";
            }

            reaccionTimer = setTimeout(() => {
                markElement.classList.remove('reaccion-activo');
                markElement.style.backgroundImage = ''; // Limpiar inline style para que mande el CSS
                
                // Restaurar el modo correcto según YouTube
                if (viendoYoutube) {
                    markElement.classList.add('modo-youtube');
                } else {
                    markElement.classList.add('idle-parpadeo');
                }
                aplicarRitmoAleatorio();
            }, 1200); 
        }

        // Iniciar con un ritmo al cargar
        aplicarRitmoAleatorio();
    </script>
    <div style="position: absolute; width: 0; height: 0; overflow: hidden; z-index: -9999; opacity: 0;">
    <img src="./assets/MarkOjosPaAbiertos.png">
    <img src="./assets/MarkOjosPaCerrados.png">
    <img src="./assets/MarkOjosCerrados.png">
    
    <img src="./assets/MarkOjosAbiertosYT.png">
    <img src="./assets/MarkOjosPaAbiertosYT.png">
    <img src="./assets/MarkOjosPaCerradosYT.png">
    <img src="./assets/MarkOjosCerradosYT.png">
    
    <img src="./assets/MarkSonriendo.png">
    <img src="./assets/MarkSonriendoConMano.png">
</div>
</body>
</html>
